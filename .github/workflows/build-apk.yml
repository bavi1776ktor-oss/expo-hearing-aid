name: Build Android APK (Manual Launch)

# Отключаем автоматический запуск при пушах. 
# Оставляем ТОЛЬКО ручной запуск кнопкой из интерфейса GitHub.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3

      # Генерируем нативную папку /android из нашего Expo-проекта
      - name: Expo Prebuild
        run: npx expo prebuild --platform android

      # Кэшируем сборщик Gradle, чтобы повторные компиляции летели быстрее
      - name: Setup Gradle Cache
        uses: gradle/actions/setup-gradle@v3

      # Собираем релизный APK (Gradle автоматически скомпилирует наш C++ код)
      - name: Build Android Release APK
        run: |
          cd android
          ./gradlew assembleRelease

      # Выкладываем готовый файл в артефакты для скачивания
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hearing-aid-app-apk
          path: android/app/build/outputs/apk/release/app-release.apk
